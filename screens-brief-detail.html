<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detail brief · Dasbor kreator · Gipsy Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="creator-common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
</head>
<body>
  <header class="topnav" data-od-id="topnav">
    <div class="topnav-inner">
      <a href="../index.html" class="brand-logo">
        <span class="logo-mark">G</span>
        <span class="logo-text">Gipsy Group</span>
      </a>
      <div class="topnav-right">
        <div class="user-info" id="user-info" title="Akun yang sedang login">
          <span class="avatar" id="session-avatar">SA</span>
          <div class="user-meta">
            <span class="user-name" id="session-name">Sasa A.</span>
            <a class="user-sub" id="session-meta" href="screens-akun.html">Cek profil →</a>
          </div>
        </div>
        <button type="button" class="btn btn-ghost" id="btn-signout">Keluar</button>
      </div>
    </div>
  </header>

  <div class="shell">
    <aside class="side-nav" data-od-id="side-nav">
      <div class="brand-mini">Kreator</div>
      <a href="screens-creator.html" data-od-id="nav-ringkasan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Ringkasan
      </a>
      <a href="screens-brief.html" class="active" data-od-id="nav-brief">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h12a4 4 0 014 4v10H8a4 4 0 01-4-4z"/><path d="M8 9h8M8 13h5"/></svg>
        Brief &amp; script
      </a>
      <a href="screens-progres.html" data-od-id="nav-progres">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19V5M4 19h19h16M8 15l3-4 3 3 5-7"/></svg>
        Progres
      </a>
      <a href="screens-riwayat.html" data-od-id="nav-riwayat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        Riwayat
      </a>
      <a href="screens-bayaran.html" data-od-id="nav-bayaran">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M 2 6 20 6z"/></svg>
        Bayaran iklan
      </a>

      <div class="signout">
        <a href="screens-login.html" id="signout-link">↩ Keluar</a>
      </div>
    </aside>

    <main class="main" id="content">
      <div class="page-head" data-od-id="page-head">
        <div>
          <a href="screens-brief.html" class="meta" style="color: var(--accent);">← Balik ke daftar brief</a>
          <h1 id="page-title">Brief &amp; script</h1>
          <p id="page-lead">Tulis script untuk brief ini. Status baru bisa di-update setelah script terisi.</p>
        </div>
      </div>

      <div id="content-area">
        <!-- dirender via JS berdasarkan ?id=brief-X -->
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="creator-common.js"></script>
  <script>
    document.addEventListener('creatorapp:ready', function () {
      const A = window.CreatorApp;
      if (!A) return;

      const params = new URLSearchParams(window.location.search);
      const briefId = params.get('id');
      const contentEl = document.getElementById('content-area');

      const STATUS_OPTIONS = [
        { value: 'draft',    label: 'Draft' },
        { value: 'editing',  label: 'Sedang ditulis' },
        { value: 'review',   label: 'Siap review' },
        { value: 'revisi',   label: 'Perlu revisi' },
        { value: 'approved', label: 'Disetujui' },
        { value: 'rejected', label: 'Ditolak' },
        { value: 'selesai',  label: 'Selesai' }
      ];
      const STATUS_LABEL = {};
      STATUS_OPTIONS.forEach(o => STATUS_LABEL[o.value] = o.label);

      const EDITABLE_STATUS = ['draft', 'editing', 'revisi'];
      // status yang biasanya di-set oleh admin (kreator bisa-bisa aja set manual untuk simulasi)
      const ADMIN_CONTROLLED = ['approved', 'rejected', 'selesai'];
      const LOCKED_AFTER_ADMIN = ['revisi', 'approved', 'rejected', 'selesai'];

      function escapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'})[c]);
      }

      function loadState(id) {
        // Single source of truth: Supabase (brief_scripts table) via A.data.scripts
        if (A.loadScript) {
          try {
            const row = (A.data.scripts || []).find(s => s.brief_id === id);
            if (row) return { script: row.script || '', status: row.status || 'draft' };
          } catch (_) {}
        }
        return { status: 'draft', script: '' };
      }
      async function persistState(id, state) {
        // Single source of truth: Supabase
        if (A.saveScript) {
          try {
            await A.saveScript(id, { script: state.script, status: state.status });
            return { ok: true, source: 'supabase' };
          } catch (err) {
            console.error('[persistState] supabase save gagal:', err);
            return { ok: false, source: 'local', error: err.message || String(err) };
          }
        }
        return { ok: true, source: 'local' };
      }

      if (!briefId) {
        contentEl.innerHTML = `
          <div class="card">
            <div class="empty-state">
              Detail brief ini dibuka dari halaman <a href="screens-brief.html" style="color: var(--accent);">Brief &amp; script</a>.
              Pilih salah satu brief lalu klik untuk mulai nulis scriptnya.
            </div>
          </div>`;
        return;
      }

      const brief = A.data.briefs.find(b => b.id === briefId);
      if (!brief) {
        contentEl.innerHTML = `
          <div class="card">
            <div class="empty-state">Brief dengan ID <code>${escapeHtml(briefId)}</code> tidak ditemukan.</div>
          </div>`;
        return;
      }

      let state = loadState(briefId);
      let scriptDirty = false;

      document.getElementById('page-title').textContent = brief.title;
      document.getElementById('page-lead').textContent  = brief.brand + ' · ' + (brief.meta || '').split(' · ')[0];

      function render() {
        const hasScript = (state.script || '').trim().length > 0;
        const statusEditable = !ADMIN_CONTROLLED.includes(state.status);
        const scriptEditable = !LOCKED_AFTER_ADMIN.includes(state.status);
        const isKreatorFinal = ['approved', 'rejected', 'selesai'].includes(state.status);

        contentEl.innerHTML = `
          <div class="card" style="margin-bottom: var(--gap-lg);" data-od-id="brief-info">
            <div class="section-title">
              <h2 class="h2">Detail brief</h2>
              <span class="meta brand-tag" style="border-color: var(--accent-soft); color: var(--accent);">${escapeHtml(brief.brand.toUpperCase())}</span>
            </div>
            <div class="field">
              <label>Judul brief</label>
              <div class="form-readonly">${escapeHtml(brief.title)}</div>
            </div>
            <div class="field">
              <label>Requirement</label>
              <div class="form-readonly">${escapeHtml(brief.meta)}</div>
            </div>
            <div class="field">
              <label>Deadline</label>
              <div class="form-readonly currency">${escapeHtml(brief.deadline)}</div>
            </div>
          </div>

          <div class="card" style="margin-bottom: var(--gap-lg);" data-od-id="brief-script">
            <div class="section-title">
              <h2 class="h2">Script video ${scriptEditable ? '' : '<span class="meta" style="font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--warn);">· dikunci</span>'}</h2>
              <span class="meta" id="script-meta">${scriptDirty ? '● ada perubahan belum disimpan' : (hasScript ? 'tersimpan' : 'belum disimpan')}</span>
            </div>
            <div class="field brief-script-wrap">
              <label for="script-text">Tulis script kamu</label>
              <textarea id="script-text" class="textarea" rows="14"
                        placeholder="Mulai ketik script untuk video ini. Misal:&#10;&#10;Hook (3 detik): ...&#10;&#10;Body (15 detik): ...&#10;&#10;CTA (2 detik): ..."
                        ${scriptEditable ? '' : 'disabled'}></textarea>
              <span class="field-hint">
                ${scriptEditable
                  ? 'Script tersimpan otomatis saat klik tombol Simpan di bawah.'
                  : 'Status sudah final (approved/ditolak/selesai) — script dikunci. Hubungi admin kalau perlu perubahan.'}
              </span>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-primary" id="btn-save-script" ${scriptEditable ? '' : 'disabled'}>Simpan script</button>
            </div>
          </div>

          <div class="card" data-od-id="brief-status">
            <div class="section-title">
              <h2 class="h2">Status brief</h2>
              <span class="meta">${hasScript ? '' : 'Isi script dulu sebelum ubah status'}</span>
            </div>

            <div class="field">
              <label>Status sekarang</label>
              <div><span class="status ${state.status}">${escapeHtml(STATUS_LABEL[state.status] || state.status)}</span></div>
            </div>

            <div class="field">
              <label>Status script</label>
              <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <span class="status ${state.status}">${escapeHtml(STATUS_LABEL[state.status] || state.status)}</span>
                <span class="meta" style="font-family: var(--font-mono); font-size: 11px;">
                  · diatur oleh admin
                </span>
              </div>
              <span class="field-hint">
                Status hanya bisa diubah oleh admin. Kamu bisa nulis script lalu klik "Tandai siap review" di bawah untuk menyerahkannya.
              </span>
            </div>

            <div class="brief-status-cta">
              <span class="cta-label">Aksi cepat</span>
              ${state.status === 'review' || state.status === 'revisi' || isKreatorFinal
                ? `<button type="button" class="btn btn-secondary" id="btn-submit-review" disabled>Sudah dikirim untuk review</button>
                   <span class="cta-hint">Brief ini menunggu admin review (atau sudah final). Status berikutnya diatur oleh admin.</span>`
                : hasScript
                  ? `<button type="button" class="btn btn-primary" id="btn-submit-review">Tandai siap review →</button>
                     <span class="cta-hint">Setelah klik ini, script akan terkunci untuk diedit sampai admin beri feedback.</span>`
                  : `<button type="button" class="btn btn-primary" id="btn-submit-review" disabled>Belum bisa: isi script dulu</button>
                     <span class="cta-hint warn">Tulis script di atas sebelum menandai siap review.</span>`}
            </div>

            ${!scriptEditable ? `
              <div class="brief-status-locked">
                <span>🔒</span>
                <div>
                  <strong>Script dikunci</strong> — status sudah <em>${escapeHtml(STATUS_LABEL[state.status] || state.status)}</em>.
                  Kontrol script sekarang di sisi admin.
                </div>
              </div>` : ''}

            ${/* Tombol "Simpan status" DIHAPUS — kreator tidak boleh ubah status sendiri.
                 Status hanya diatur oleh admin. Kreator cukup nulis script + klik
                 "Tandai siap review" untuk submit. */ ''}
          </div>

          ${renderUploadCard(brief, state.status)}
        `;

        // populate textarea
        const ta = document.getElementById('script-text');
        ta.value = state.script || '';
        // Status display only — kreator tidak bisa pilih status (kunci dari admin)

        // wire events (guarded — kalau element gak ada karena disabled state, skip)
        ta.addEventListener('input', () => {
          scriptDirty = true;
          // Update state.script live (jangan tunggu save) — biar pas save handler baca,
          // yang diambil adalah teks terbaru. JANGAN panggil render() di sini, karena
          // render() replace innerHTML dan ngehilangin teks yang lagi diketik.
          state.script = ta.value;
          const meta = document.getElementById('script-meta');
          if (meta) meta.textContent = '● ada perubahan belum disimpan';
        });

        document.getElementById('btn-save-script').addEventListener('click', async () => {
          state.script = ta.value;
          scriptDirty = false;
          const btn = document.getElementById('btn-save-script');
          const orig = btn.textContent;
          btn.disabled = true; btn.textContent = 'Menyimpan…';
          try {
            const res = await persistState(briefId, state);
            if (res.source === 'supabase') {
              A.showToast('Script tersinkron ke cloud ✓');
            } else if (res.source === 'local' && res.error) {
              A.showToast('Supabase error: ' + res.error + ' (fallback lokal)', 'error');
            } else {
              A.showToast('Script tersimpan di lokal (offline).');
            }
          } catch (err) {
            A.showToast('Gagal: ' + err.message, 'error');
          } finally {
            btn.disabled = false; btn.textContent = orig;
            render();
          }
        });

        // btn-save-status: DIHAPUS — kreator tidak boleh ubah status sendiri,
        // itu domain admin. Status cuma bisa berubah via "Tandai siap review" di bawah
        // (otomatis set ke 'review'), atau via admin action (Setujui/Minta revisi/Tolak).

        const ctaBtn = document.getElementById('btn-submit-review');
        if (ctaBtn && !ctaBtn.disabled && state.status !== 'review' && state.status !== 'revisi' && !isKreatorFinal) {
          ctaBtn.addEventListener('click', async () => {
            state.script = ta.value; // auto-save script first
            state.status = 'review';
            scriptDirty = false;
            try {
              await persistState(briefId, state);
              A.showToast('Brief ditandai siap review. Menunggu admin.');
            } catch (err) {
              A.showToast('Gagal: ' + err.message, 'error');
            }
            render();
          });
        }

        // Wire upload form (kalau enabled setelah script approved)
        const uploadForm = document.getElementById('brief-upload-form');
        const uploadSubmit = document.getElementById('brief-btn-submit');
        const uploadDraft = document.getElementById('brief-btn-draft');
        if (uploadForm) uploadForm.addEventListener('submit', (e) => { e.preventDefault(); handleBriefUpload('review'); });
        if (uploadSubmit) uploadSubmit.addEventListener('click', (e) => { e.preventDefault(); handleBriefUpload('review'); });
        if (uploadDraft) uploadDraft.addEventListener('click', (e) => { e.preventDefault(); handleBriefUpload('draft'); });
      }

      render();

      // ---- auto-refresh kalau tab kembali aktif atau ada perubahan dari tab/admin lain ----
      // Admin update script status di Supabase → kreator side perlu re-fetch supaya keliatan.
      async function refreshFromCloud() {
        try {
          await A.refresh();
          const fresh = loadState(briefId);
          // Hanya update state kalau tidak ada perubahan belum disimpan (scriptDirty = false)
          if (!scriptDirty) {
            state = fresh;
            render();
          }
        } catch (_) { /* offline, skip */ }
      }
      window.addEventListener('focus', refreshFromCloud);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') refreshFromCloud();
      });
      // Listener dari creator-common.js (mis. saveScript selesai)
      document.addEventListener('creatorapp:data-changed', (e) => {
        if (e.detail && e.detail.type === 'script' && e.detail.briefId === briefId) {
          refreshFromCloud();
        }
      });

      // ---- upload card: video + thumbnail, linked ke brief via progress.brief_id ----
      function renderUploadCard(brief, scriptStatus) {
        const canUpload = scriptStatus === 'approved' || scriptStatus === 'selesai';
        // Cek apakah sudah ada progress row untuk brief ini (kreator ini)
        const existing = (A.data.progress || []).find(p =>
          p.brief_id === brief.id && p.kreator === A.session.username
        );
        if (existing) {
          // Sudah pernah upload → tampilin status, bukan form
          return `
            <div class="card" data-od-id="brief-upload" style="margin-top: var(--gap-lg);">
              <div class="section-title">
                <h2 class="h2">Video kamu</h2>
                <span class="status ${existing.status}">${STATUS_LABEL[existing.status] || existing.status}</span>
              </div>
              <div class="field">
                <label>Judul</label>
                <div class="form-readonly">${escapeHtml(existing.title || brief.title)}</div>
              </div>
              ${existing.video_url ? `<div class="field"><label>Link video</label><div class="form-readonly"><a href="${escapeHtml(existing.video_url)}" target="_blank" rel="noopener" style="color: var(--accent);">${escapeHtml(existing.video_url)}</a></div></div>` : ''}
              <span class="field-hint">Untuk revisi / upload ulang, hubungi admin atau gunakan halaman Progres.</span>
            </div>`;
        }
        return `
          <div class="card" data-od-id="brief-upload" style="margin-top: var(--gap-lg);">
            <div class="section-title">
              <h2 class="h2">Upload video</h2>
              <span class="meta">${canUpload ? 'Script sudah di-approve — siap upload' : 'Menunggu script di-approve admin'}</span>
            </div>
            ${!canUpload ? `
              <div class="brief-status-locked">
                <span>🔒</span>
                <div>
                  <strong>Upload terkunci</strong> — script belum di-approve admin (status: <em>${escapeHtml(STATUS_LABEL[scriptStatus] || scriptStatus || 'draft')}</em>).
                  Tunggu admin approve script di sini, baru kamu bisa upload video.
                </div>
              </div>
            ` : `
              <form id="brief-upload-form">
                <div class="field">
                  <label for="brief-vid-link">Link video <small style="color: var(--muted); font-weight: 400;">(YouTube / TikTok / drive)</small></label>
                  <input type="url" class="input" id="brief-vid-link" placeholder="https://…" />
                  <span class="field-hint">Atau upload file di bawah — pilih salah satu.</span>
                </div>
                <div class="field">
                  <label for="brief-vid-file">File video <small style="color: var(--muted); font-weight: 400;">(opsional)</small></label>
                  <input type="file" class="input" id="brief-vid-file" accept="video/mp4,video/quicktime,video/webm" />
                  <span class="field-hint">Format .mp4/.mov/.webm — maks 200MB.</span>
                </div>
                <div class="field">
                  <label for="brief-vid-thumb">Thumbnail <small style="color: var(--muted); font-weight: 400;">(opsional)</small></label>
                  <input type="file" class="input" id="brief-vid-thumb" accept="image/png,image/jpeg,image/webp" />
                </div>
                <div class="field">
                  <label for="brief-vid-title">Judul untuk admin</label>
                  <input type="text" class="input" id="brief-vid-title" value="${escapeHtml(brief.title)}" />
                </div>
                <div class="field">
                  <label for="brief-vid-notes">Catatan untuk admin <small style="color: var(--muted); font-weight: 400;">(opsional)</small></label>
                  <textarea class="textarea" id="brief-vid-notes" rows="2" placeholder="Hal yang perlu admin perhatikan?"></textarea>
                </div>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin: 6px 0 14px;">
                  <input type="checkbox" id="brief-vid-ready" />
                  Saya siap kirim untuk review admin sekarang.
                </label>
                <div style="display: flex; gap: 8px;">
                  <button type="submit" class="btn btn-primary" id="brief-btn-submit">Kirim untuk review</button>
                  <button type="button" class="btn btn-secondary" id="brief-btn-draft">Simpan draft</button>
                </div>
              </form>
            `}
          </div>`;
      }

      // Wire upload form (kalau ada setelah render)
      async function handleBriefUpload(status) {
        const linkEl = document.getElementById('brief-vid-link');
        const fileEl = document.getElementById('brief-vid-file');
        const thumbEl = document.getElementById('brief-vid-thumb');
        const titleEl = document.getElementById('brief-vid-title');
        const notesEl = document.getElementById('brief-vid-notes');
        const submitBtn = document.getElementById('brief-btn-submit');
        const draftBtn = document.getElementById('brief-btn-draft');
        if (!linkEl || !titleEl) return;

        const link = linkEl.value.trim();
        const file = fileEl.files[0];
        const thumb = thumbEl.files[0];
        const title = titleEl.value.trim();
        const notes = notesEl ? notesEl.value.trim() : '';

        if (!link && !file) {
          A.showToast('Lengkapi link video atau upload file.', 'error');
          return;
        }
        if (title.length < 3) {
          A.showToast('Judul minimal 3 karakter.', 'error');
          return;
        }
        if (link && !/^https?:\/\/.+\..+/.test(link)) {
          A.showToast('Link video tidak valid.', 'error');
          return;
        }

        submitBtn.disabled = true; draftBtn.disabled = true;
        const origLabel = submitBtn.textContent;
        try {
          let storagePath = null, thumbPath = null;
          if (file) {
            submitBtn.innerHTML = '<span class="spinner"></span> Upload video…';
            storagePath = await A.uploadFile(file, 'videos');
          }
          if (thumb) {
            submitBtn.innerHTML = '<span class="spinner"></span> Upload thumbnail…';
            thumbPath = await A.uploadFile(thumb, 'thumbnails');
          }
          submitBtn.innerHTML = '<span class="spinner"></span> Simpan ke database…';
          await A.submitProgress({
            title,
            brand: brief.brand,
            status,
            meta: notes || (status === 'review' ? 'Terkirim untuk review' : 'Draft'),
            video_url: link || null,
            video_storage_path: storagePath,
            thumbnail_path: thumbPath,
            brief_id: brief.id
          });
          A.showToast(status === 'review' ? 'Terkirim untuk review admin ✓' : 'Draft tersimpan.', 'success');
          render();
        } catch (err) {
          A.showToast('Upload gagal: ' + err.message, 'error');
          submitBtn.disabled = false; draftBtn.disabled = false;
          submitBtn.textContent = origLabel;
        }
      }
    });
  </script>
</body>
</html>
