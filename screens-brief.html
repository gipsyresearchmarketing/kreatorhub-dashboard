  <script>
    document.addEventListener('creatorapp:ready', function () {
      const A = window.CreatorApp;
      if (!A) return;

      // sembunyikan brand chip yang gak diizinkan
      document.querySelectorAll('#brand-chips .brand-chip').forEach(chip => {
        const b = chip.dataset.brand;
        if (b === 'all') return;
        if (!A.userBrands.includes(b)) chip.style.display = 'none';
      });

      const briefListEl = document.getElementById('brief-list');
      const BRIEF_STATUS_LABEL = {
        draft: 'Draft', editing: 'Sedang ditulis', review: 'Siap review',
        revisi: 'Perlu revisi', approved: 'Disetujui', rejected: 'Ditolak', selesai: 'Selesai'
      };
      function getBriefStateSummary(id) {
        try {
          // Key per-kreator: biar script pipit ga bocor ke cherly di localStorage yang sama
          const me = A.session && A.session.username;
          const key = 'kreatorhub.brief-state.' + (me || '_anon') + '.' + id;
          const raw = localStorage.getItem(key);
          if (!raw) return { hasScript: false, status: null };
          const d = JSON.parse(raw);
          return {
            hasScript: !!(d.script && d.script.trim().length > 0),
            status: d.status || 'draft'
          };
        } catch (_) { return { hasScript: false, status: null }; }
      }
      function renderBriefs(filterBrand) {
        briefListEl.innerHTML = '';
        // Filter visibility per kreator: hanya brief yang assigned_to = username kreator
        // ATAU belum di-assign (terbuka). Kreator lain tidak boleh lihat.
        const me = A.session && A.session.username;
        let briefs = (A.data.briefs || []).filter(b => !b.assigned_to || b.assigned_to === me);
        if (filterBrand && filterBrand !== 'all') briefs = briefs.filter(b => b.brand === filterBrand);
        document.getElementById('brief-count').textContent = briefs.length + ' brief · ' + (filterBrand && filterBrand !== 'all' ? filterBrand : 'semua brand');
        if (!briefs.length) {
          briefListEl.innerHTML = '<div class="empty-state">Belum ada brief aktif untuk Anda.</div>';
          return;
        }
        briefs.forEach(b => {
          const card = document.createElement('div');
          card.className = 'brief-card';
          card.dataset.brand = b.brand;
          card.dataset.odId = b.id;
          const summary = getBriefStateSummary(b.id);
          const summaryHtml = summary.hasScript
            ? `<span class="status ${summary.status}">${BRIEF_STATUS_LABEL[summary.status] || summary.status}</span>`
            : `<span class="brief-summary-pill">Belum dimulai</span>`;
          card.innerHTML = `
            <span class="brand-tag">${b.brand.toUpperCase()}</span>
            <div class="brief-info">
              <strong>${b.title}</strong>
              <span class="meta">${b.meta}</span>
              ${summaryHtml}
            </div>
            <div class="deadline">${b.deadline}</div>
          `;
          card.addEventListener('click', () => {
            window.location.href = 'screens-brief-detail.html?id=' + encodeURIComponent(b.id);
          });
          briefListEl.appendChild(card);
        });
      }

      let currentBrandFilter = 'all';
      document.querySelectorAll('#brand-chips .brand-chip').forEach(c => {
        c.addEventListener('click', () => {
          currentBrandFilter = c.dataset.brand;
          document.querySelectorAll('#brand-chips .brand-chip').forEach(x => x.classList.toggle('active', x === c));
          renderBriefs(currentBrandFilter);
        });
      });

      renderBriefs('all');
    });
  </script>
